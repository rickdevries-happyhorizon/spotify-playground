<!DOCTYPE html>
<html lang="en" data-skin="{{ ui_skin }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Tracks To-Do</title>
  <link rel="stylesheet" href="/static/css/new_tracks_todo.css">
</head>
<body>
  <header>
    <div class="container">
      <a class="back-link" id="back-link" href="/" hidden>← All genres</a>
      <div class="page-heading">
        <img class="page-cover" id="page-cover" alt="" hidden />
        <div class="page-heading__text">
          <h1 id="page-title">New Tracks To-Do</h1>
          <p id="page-subtitle">Choose a genre to manage reference URLs for its tracks.</p>
        </div>
      </div>
    </div>
  </header>

  <div class="container">
    <div class="banner loading" id="banner">Loading…</div>
  </div>

  <section class="genre-screen view container" id="genre-view">
    <h2>Genres</h2>
    <ul class="genre-grid" id="genre-grid"></ul>
  </section>

  <section class="genre-hub view container" id="genre-hub-view" hidden>
    <h2>Choose a list</h2>
    <ul class="filter-grid" id="filter-grid"></ul>
  </section>

  <div class="view" id="tracks-view" hidden>
    <div class="container">
      <nav class="filter-tabs" id="filter-tabs" aria-label="Track lists">
        <a class="filter-tab filter-tab--done" id="tab-with-url" href="#">Has reference URL <span class="count" id="tab-count-done">0</span></a>
        <a class="filter-tab filter-tab--todo" id="tab-without-url" href="#">Needs reference URL <span class="count" id="tab-count-todo">0</span></a>
      </nav>

      <section class="add-panel">
        <h2>Add track</h2>
        <form class="add-form" id="add-form">
          <input type="text" name="track" placeholder="Artist - Track name" required />
          <input type="url" name="reference_url" placeholder="Reference URL (optional)" />
          <button type="submit">Add</button>
        </form>
      </section>

      <main>
        <section class="column column--done" id="column-done">
          <div class="column-header">
            <span>Has reference URL</span>
            <span class="count" id="count-done">0</span>
          </div>
          <ul class="track-list" id="list-done"></ul>
        </section>

        <section class="column column--todo" id="column-todo" hidden>
          <div class="column-header">
            <span>Needs reference URL</span>
            <span class="count" id="count-todo">0</span>
          </div>
          <ul class="track-list" id="list-todo"></ul>
        </section>
      </main>
    </div>
  </div>

  <div class="status" id="status" role="status" aria-live="polite"></div>
  <div class="copy-toast" id="copy-toast" aria-live="polite"></div>

  <script src="/static/js/new_tracks_todo.js"></script>
</body>
</html>
