<section class="statistics-screen view container" id="statistics-view" hidden>
  <div class="stats-summary" id="stats-summary"></div>
  <section class="stats-section">
    <h2>By genre</h2>
    <div class="stats-table-wrap">
      <table class="stats-table" id="stats-genre-table">
        <thead>
          <tr>
            <th scope="col">Genre</th>
            <th scope="col">Total</th>
            <th scope="col">Has URL</th>
            <th scope="col">Needs URL</th>
            <th scope="col">Complete</th>
          </tr>
        </thead>
        <tbody id="stats-genre-body"></tbody>
      </table>
    </div>
  </section>
</section>
