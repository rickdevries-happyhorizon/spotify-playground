<section class="settings-card settings-card--dates">
  <div class="settings-card__accent" aria-hidden="true"></div>
  <div class="settings-card__header">
    <span class="settings-card__icon" aria-hidden="true">📅</span>
    <div>
      <h3>{{ _("Dates") }}</h3>
      <p>{{ _("Control how far back sync and new-track import look.") }}</p>
    </div>
  </div>
  <div class="settings-dates-grid">
    <div class="settings-date-field">
      <h4 class="settings-date-field__title">{{ _("Sync start date") }}</h4>
      <p class="settings-date-field__desc">{{ _("Artist releases and source playlist sync look back from this date.") }}</p>
      <label class="settings-field">
        <span class="settings-field__label">{{ _("Start date") }} <span class="settings-field__hint">{{ _("(empty = last 7 days)") }}</span></span>
        <input type="date" name="sync_start_date" />
      </label>
    </div>
    <div class="settings-date-field">
      <h4 class="settings-date-field__title">{{ _("New tracks start date") }}</h4>
      <p class="settings-date-field__desc">{{ _("Only import tracks into new_tracks after this date.") }}</p>
      <label class="settings-field">
        <span class="settings-field__label">{{ _("Start date") }} <span class="settings-field__hint">{{ _("(empty = last 7 days)") }}</span></span>
        <input type="date" name="tracking_start_date" />
      </label>
    </div>
  </div>
</section>
