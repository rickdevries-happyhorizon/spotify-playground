<section class="settings-card settings-card--dates">
  <div class="settings-card__accent" aria-hidden="true"></div>
  <div class="settings-card__header">
    <span class="settings-card__icon" aria-hidden="true">📅</span>
    <div>
      <h3>Dates</h3>
      <p>Control how far back sync and new-track import look.</p>
    </div>
  </div>
  <div class="settings-dates-grid">
    <div class="settings-date-field">
      <h4 class="settings-date-field__title">Sync start date</h4>
      <p class="settings-date-field__desc">Artist releases and source playlist sync look back from this date.</p>
      <label class="settings-field">
        <span class="settings-field__label">Start date <span class="settings-field__hint">(empty = last 7 days)</span></span>
        <input type="date" name="sync_start_date" />
      </label>
    </div>
    <div class="settings-date-field">
      <h4 class="settings-date-field__title">New tracks start date</h4>
      <p class="settings-date-field__desc">Only import tracks into new_tracks after this date.</p>
      <label class="settings-field">
        <span class="settings-field__label">Start date <span class="settings-field__hint">(empty = last 7 days)</span></span>
        <input type="date" name="tracking_start_date" />
      </label>
    </div>
  </div>
</section>
