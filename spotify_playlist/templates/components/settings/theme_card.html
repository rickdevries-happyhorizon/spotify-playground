<section class="settings-card settings-card--theme">
  <div class="settings-card__accent" aria-hidden="true"></div>
  <div class="settings-card__header">
    <span class="settings-card__icon" aria-hidden="true">🎨</span>
    <div>
      <h3>Theme</h3>
      <p>Pick the vibe for the whole app.</p>
    </div>
  </div>
  <div class="theme-cards">
    <label class="theme-card theme-card--light">
      <input type="radio" name="ui_skin" value="light" />
      <span class="theme-card__frame">
        <span class="theme-card__preview theme-card__preview--light" aria-hidden="true">
          <span class="theme-card__bars theme-card__bars--mono">
            <span></span><span></span><span></span>
          </span>
        </span>
        <span class="theme-card__label">
          <strong>Light</strong>
          <small>Clean black &amp; white</small>
        </span>
        <span class="theme-card__check" aria-hidden="true">✓</span>
      </span>
    </label>
    <label class="theme-card theme-card--dark">
      <input type="radio" name="ui_skin" value="dark" />
      <span class="theme-card__frame">
        <span class="theme-card__preview theme-card__preview--dark" aria-hidden="true">
          <span class="theme-card__bars theme-card__bars--dark">
            <span></span><span></span><span></span>
          </span>
        </span>
        <span class="theme-card__label">
          <strong>Dark</strong>
          <small>Flat dark mode</small>
        </span>
        <span class="theme-card__check" aria-hidden="true">✓</span>
      </span>
    </label>
    <label class="theme-card theme-card--colorful">
      <input type="radio" name="ui_skin" value="colorful" />
      <span class="theme-card__frame">
        <span class="theme-card__preview theme-card__preview--colorful" aria-hidden="true">
          <span class="theme-card__orb theme-card__orb--pink"></span>
          <span class="theme-card__orb theme-card__orb--purple"></span>
          <span class="theme-card__orb theme-card__orb--green"></span>
          <span class="theme-card__bars">
            <span></span><span></span><span></span>
          </span>
        </span>
        <span class="theme-card__label">
          <strong>Colorful</strong>
          <small>Gradients, glow, motion</small>
        </span>
        <span class="theme-card__check" aria-hidden="true">✓</span>
      </span>
    </label>
  </div>
</section>
