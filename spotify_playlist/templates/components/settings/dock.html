<div class="settings-dock" id="settings-dock">
  <div class="settings-dock__status" role="status" aria-live="polite">
    <span class="settings-dock__pulse" aria-hidden="true"></span>
    <span id="settings-dock-text">{{ _("Ready to save") }}</span>
  </div>
  <button type="submit" class="settings-save shimmer-button">
    <span class="settings-save__shine" aria-hidden="true"></span>
    <span class="shimmer-button__spark" aria-hidden="true"></span>
    {{ _("Save settings") }}
  </button>
</div>
